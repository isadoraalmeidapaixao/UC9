<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Caputra dados do usuário-->   
    <input id="cepInput" type="text" placeholder="Informe o CEP...">
    <!--Registra a ação do usuário--> 
    <button id="btnBuscar">BUSCAR</button>

    <!--Exibe o resultado final, ao usuário--> 
    <p id="resultado">Aguardando busca...</p>

    <script>
        const cepInput = document.getElementById("cepInput");
        const btnBuscar = document.getElementById("btnBuscar");
        const resultado = document.getElementById("resultado");

        btnBuscar.addEventListener('click', async () => {
            const valorDigitado = cepInput.value;
            var resposta = await fetch(`https://viacep.com.br/ws/${valorDigitado}/json/`)
            var dados = await resposta.json()

            resultado.innerText = dados.logradouro + " - " + dados.bairro + " - " + dados.localidade
        })
    </script>
</body>
</html>
