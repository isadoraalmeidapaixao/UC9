<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--captura dados do usuario-->
    <input id="cepInput" type="text" placeholder="Informe o CEP">
    <!--registra ação do usuario-->
    <button id="btnBuscar">BUSCAR</button>
    <!--exibe o resultad final ao usuario-->
    <p id="resultado">Aguardando busca... !</p>

    <script>
        const cepInput = document.getElementById("cepInput")
        const btnBuscar = document.getElementById("btnBuscar")
        const resultado = document.getElementById("resultado")

        btnBuscar.addEventListener('click', async () => {
            const valorDigitado = cepInput.innerText;
            var resposta = await fetch('https://viacep.com.br/ws/${valorDigitado}/json/')
            var dados = await resposta.json()

            document.getElementById("resultado").innerText = dados.logradouro + "-" + dados.bairro + "-" + dados.estado
           })


    </script>
</body>
</html>
