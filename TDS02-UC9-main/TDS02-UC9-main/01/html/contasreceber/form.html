<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Conta a Receber</title>
    <link rel="stylesheet" href="../../css/global.css">
    <script src="../../js/config.js"></script>
    <script src="../../js/contasreceber/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Controle de Estoque</h1>
        <nav>
            <a href="../../index.html">Home</a>
            <a href="index.html">Contas a Receber</a>
        </nav>
    </header>

    <main>
        <h2 id="titulo-pagina">Nova Conta a Receber</h2>
        
        <form id="form-conta">
            <label for="descricao">Descrição:</label>
            <input type="text" id="descricao" required>

            <label for="valor">Valor:</label>
            <input type="number" id="valor" step="0.01" required>

            <label for="dataVencimento">Data de Vencimento:</label>
            <input type="date" id="dataVencimento" required>

            <label for="dataPagamento">Data de Pagamento:</label>
            <input type="date" id="dataPagamento">

            <label for="status">Status:</label>
            <select id="status" required>
                <option value="">Selecione um status</option>
                <option value="Pendente">Pendente</option>
                <option value="Pago">Pago</option>
                <option value="Cancelado">Cancelado</option>
            </select>

            <label for="clienteId">ID do Cliente:</label>
            <input type="number" id="clienteId" required>

            <button type="submit">Salvar</button>
            <a href="index.html" class="button" style="background-color: #6c757d;">Cancelar</a>
        </form>
    </main>
</body>
</html>
