<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Produto</title>
    <link rel="stylesheet" href="../../css/global.css">
    <script src="../../js/config.js"></script>
    <script src="../../js/produtos/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Controle de Estoque</h1>
        <nav>
            <a href="../../index.html">Home</a>
            <a href="index.html">Produtos</a>
        </nav>
    </header>

    <main>
        <h2 id="titulo-pagina">Novo Produto</h2>
        
        <form id="form-produto">
            <label for="nome">Nome do Produto:</label>
            <input type="text" id="nome" required>

            <label for="preco">Preço:</label>
            <input type="number" id="preco" step="0.01" required>

            <label for="quantidadeEstoque">Quantidade em Estoque:</label>
            <input type="number" id="quantidadeEstoque" required>

            <label for="fornecedorId">ID do Fornecedor:</label>
            <input type="number" id="fornecedorId" required>

            <button type="submit">Salvar</button>
            <a href="index.html" class="button" style="background-color: #6c757d;">Cancelar</a>
        </form>
    </main>
</body>
</html>
